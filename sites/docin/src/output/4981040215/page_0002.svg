  <g clip-path="url(#hkswfjson-cp100001)">
  <text font-family="f0f7" font-size="12" x="517.00" y="786.00">2</text>
  <text font-family="f0f8" font-size="14" x="71.00" y="86.00">3</text>
  <text font-family="f0f10" font-size="14" x="78.00" y="86.00">.</text>
  <text font-family="f0f7" font-size="14" x="82.00 96.00 110.00 124.00 138.00 152.00 166.00 180.00 194.00 208.00" y="86.00">某县举行安全知识竞赛</text>
  <text font-family="f0f13" font-size="14" x="222.00" y="86.00">,</text>
  <text font-family="f0f7" font-size="14" x="225.00" y="86.00">共</text>
  <text font-family="f0f13" font-size="14" x="243.00 250.00" y="86.00">12</text>
  <text font-family="f0f7" font-size="14" x="260.00 274.00 288.00 302.00 316.00 330.00 344.00 358.00" y="86.00">所学校的代表参加</text>
  <text font-family="f0f10" font-size="14" x="372.00" y="86.00">.</text>
  <text font-family="f0f7" font-size="14" x="375.00 389.00 403.00 417.00 431.00 445.00 459.00 473.00 487.00" y="86.00">比赛采取双循环赛制</text>
  <text font-family="f0f13" font-size="14" x="501.00" y="86.00">,</text>
  <text font-family="f0f7" font-size="14" x="505.00" y="86.00">每</text>
  <text font-family="f0f7" font-size="14" x="71.00 86.00 99.00 113.00 128.00 141.00 155.00 170.00 183.00" y="122.00">所学校的代表队比赛</text>
  <text font-family="f0f13" font-size="14" x="201.00 208.00" y="122.00">22</text>
  <text font-family="f0f7" font-size="14" x="218.00" y="122.00">场</text>
  <text font-family="f0f13" font-size="14" x="232.00" y="122.00">(</text>
  <text font-family="f0f7" font-size="14" x="236.00 251.00 264.00 278.00" y="122.00">胜一场得</text>
  <text font-family="f0f13" font-size="14" x="296.00" y="122.00">2</text>
  <text font-family="f0f7" font-size="14" x="306.00" y="122.00">分</text>
  <text font-family="f0f13" font-size="14" x="320.00" y="122.00">,</text>
  <text font-family="f0f7" font-size="14" x="323.00 337.00 351.00 365.00" y="122.00">负一场得</text>
  <text font-family="f0f13" font-size="14" x="383.00" y="122.00">1</text>
  <text font-family="f0f7" font-size="14" x="393.00" y="122.00">分</text>
  <text font-family="f0f13" font-size="14" x="407.00 411.00" y="122.00">),</text>
  <text font-family="f0f7" font-size="14" x="415.00 429.00 443.00 457.00 471.00 485.00 499.00" y="122.00">最终甲学校以总</text>
  <text font-family="f0f7" font-size="14" x="71.00" y="158.00">分</text>
  <text font-family="f0f13" font-size="14" x="89.00 96.00" y="158.00">40</text>
  <text font-family="f0f7" font-size="14" x="106.00 120.00 134.00 148.00 162.00 176.00" y="158.00">分获得第一名</text>
  <text font-family="f0f13" font-size="14" x="190.00" y="158.00">,</text>
  <text font-family="f0f7" font-size="14" x="193.00 207.00 221.00 235.00 249.00 263.00 277.00 291.00 305.00 319.00" y="158.00">那么甲学校的胜场数为</text>
  <text font-family="f0f10" font-size="14" x="333.00 340.00 347.00 354.00 361.00 368.00 375.00 382.00 389.00" y="158.00">________.</text>
  <text font-family="f0f7" font-size="14" x="71.00 86.00 99.00 113.00 128.00 141.00" y="195.00">二、能力提升</text>
  <text font-family="f0f8" font-size="14" x="71.00" y="231.00">4</text>
  <text font-family="f0f10" font-size="14" x="78.00" y="231.00">.</text>
  <text font-family="f0f7" font-size="14" x="82.00 96.00 110.00 124.00 138.00" y="231.00">某中学举行</text>
  <text font-family="f0f13" font-size="14" x="152.00" y="231.00">“</text>
  <text font-family="f0f7" font-size="14" x="158.00 172.00 186.00 200.00" y="231.00">我爱祖国</text>
  <text font-family="f0f13" font-size="14" x="214.00" y="231.00">”</text>
  <text font-family="f0f7" font-size="14" x="220.00 234.00 248.00 262.00 276.00 290.00" y="231.00">知识竞答比赛</text>
  <text font-family="f0f13" font-size="14" x="304.00" y="231.00">,</text>
  <text font-family="f0f7" font-size="14" x="308.00 322.00 336.00 350.00 364.00 378.00 392.00 406.00 420.00" y="231.00">规定每名选手共要答</text>
  <text font-family="f0f13" font-size="14" x="437.00 444.00" y="231.00">20</text>
  <text font-family="f0f7" font-size="14" x="454.00 468.00" y="231.00">道题</text>
  <text font-family="f0f13" font-size="14" x="482.00" y="231.00">,</text>
  <text font-family="f0f7" font-size="14" x="486.00 500.00" y="231.00">每答</text>
  <text font-family="f0f7" font-size="14" x="72.00 86.00 99.00 113.00" y="267.00">对一题得</text>
  <text font-family="f0f13" font-size="14" x="131.00" y="267.00">5</text>
  <text font-family="f0f7" font-size="14" x="141.00" y="267.00">分</text>
  <text font-family="f0f13" font-size="14" x="155.00" y="267.00">,</text>
  <text font-family="f0f7" font-size="14" x="158.00 172.00 186.00 200.00 214.00 228.00 242.00 256.00" y="267.00">不答或答错一题扣</text>
  <text font-family="f0f13" font-size="14" x="274.00" y="267.00">2</text>
  <text font-family="f0f7" font-size="14" x="284.00" y="267.00">分</text>
  <text font-family="f0f10" font-size="14" x="298.00" y="267.00">.</text>
  <text font-family="f0f13" font-size="14" x="71.00 76.00 83.00" y="303.00">(1)</text>
  <text font-family="f0f7" font-size="14" x="88.00 102.00 116.00 130.00 144.00 158.00 172.00" y="304.00">设选手小丽答对</text>
  <text font-family="f0f10" font-size="14" x="189.00" y="303.00">x</text>
  <text font-family="f0f7" font-size="14" x="198.00 212.00" y="304.00">道题</text>
  <text font-family="f0f13" font-size="14" x="226.00" y="303.00">,</text>
  <text font-family="f0f7" font-size="14" x="230.00 244.00 258.00 272.00 286.00 300.00 314.00 328.00 342.00" y="304.00">则小丽不答或答错共</text>
  <text font-family="f0f10" font-size="14" x="356.00 363.00 370.00 377.00 384.00 391.00 398.00 405.00" y="303.00">________</text>
  <text font-family="f0f7" font-size="14" x="412.00 426.00" y="304.00">道题</text>
  <text font-family="f0f13" font-size="14" x="440.00" y="303.00">(</text>
  <text font-family="f0f7" font-size="14" x="444.00 458.00" y="304.00">用含</text>
  <text font-family="f0f10" font-size="14" x="476.00" y="303.00">x</text>
  <text font-family="f0f7" font-size="14" x="485.00 499.00" y="304.00">的代</text>
  <text font-family="f0f7" font-size="14" x="71.00 86.00 99.00 113.00" y="340.00">数式表示</text>
  <text font-family="f0f13" font-size="14" x="128.00 132.00" y="340.00">);</text>
  <text font-family="f0f13" font-size="14" x="71.00 76.00 83.00" y="376.00">(2)</text>
  <text font-family="f0f7" font-size="14" x="88.00 102.00 116.00 130.00 144.00 158.00 172.00 186.00" y="376.00">若小丽最终成绩为</text>
  <text font-family="f0f13" font-size="14" x="203.00 210.00" y="376.00">65</text>
  <text font-family="f0f7" font-size="14" x="220.00" y="376.00">分</text>
  <text font-family="f0f13" font-size="14" x="234.00" y="376.00">,</text>
  <text font-family="f0f7" font-size="14" x="238.00 252.00" y="376.00">结合</text>
  <text font-family="f0f13" font-size="14" x="266.00 270.00 277.00 282.00" y="376.00">(1),</text>
  <text font-family="f0f7" font-size="14" x="285.00 299.00 313.00 327.00 341.00 355.00 369.00 383.00 397.00 411.00" y="376.00">求小丽答对了多少道题</text>
  <text font-family="f0f10" font-size="14" x="425.00" y="376.00">.</text>
  <text font-family="f0f7" font-size="14" x="71.00 86.00 99.00 113.00 128.00 141.00" y="734.00">三、思维拓展</text>

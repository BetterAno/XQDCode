syntax = "proto3";

message PushHeader {
    string key = 1;
    string value = 2;
}

message PushFrame {
    uint64 SeqID = 1;
    uint64 LogID = 2;
    int32 service = 3;
    int32 method = 4;
    repeated PushHeader headers = 5;
    string payload_encoding = 6;
    string payload_type = 7;
    bytes payload = 8;
    string LodIDNew = 9;
}


message Message {
    string method = 1;
    bytes payload = 2;
    int64 msg_id = 3;
    int32 msg_type = 4;
    int64 offset = 5;
    bool need_wrds_store = 6;
    int64 wrds_version = 7;
    string wrds_sub_key = 8;
}

message Response {
    repeated Message messages = 1;
    string cursor = 2;
    int64 fetch_interval = 3;
    int64 now = 4;
    string internal_ext = 5;
    int32 fetch_type = 6;
    int64 heartbeat_duration = 8;
    bool need_ack = 9;
    string push_server = 10;
    string live_cursor = 11;
    bool history_no_more = 12;
    string proxy_server = 13;
}


message User {
    string id = 1;    // 用户 UID（字符串形式的大整数）
    string short_id = 2;    // 短 ID（基本废弃，几乎都是 "0"）
    string nickname = 3;    // 昵称
    int32 gender = 4;    // 性别：1=男，2=女，0=未知
    string signature = 5;    // 个性签名
    int32 level = 6;    // 用户等级（魅力等级）
    string birthday = 7;    // 生日时间戳（字符串）
    string telephone = 8;    // 手机号（通常为空）
    string city = 14;   // 城市
    int32 status = 15;   // 账号状态
    string create_time = 16;   // 注册时间（字符串时间戳）
    string modify_time = 17;   // 资料修改时间
    int32 secret = 18;   // 是否隐藏搜索
    string share_qrcode_uri = 19;   // 个人二维码 URI
    string display_id = 38;   // 抖音号（唯一英文 ID）
    bool allow_be_located = 1001; // 允许被定位
    bool allow_find_by_contacts = 1002; // 允许通过通讯录找到
    bool is_following = 1030; // 是否关注了你
    bool is_follower = 1029; // 是否是你的粉丝
    bool verified_mobile = 1042; // 是否绑定手机号认证

}

message ChatMessage {
    User user = 2;
    string content = 3;
}

